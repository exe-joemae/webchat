<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Web VRChat-like</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Room / UI -->
  <div id="top-ui">
    <div id="room-panel">
      <div class="panel-title">Room</div>
      <form id="room-form">
        <input id="room-input" type="text" placeholder="部屋名を入力 (例: lobby)" autocomplete="off" />
        <button type="submit">入室</button>
      </form>
      <div id="room-status">未入室</div>
    </div>

    <div id="voice-panel">
      <div class="panel-title">Voice</div>
      <button id="voice-toggle">マイクOFF</button>
      <div id="voice-status">マイク未使用</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="ui">
    <div id="chat-log"></div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="メッセージを入力..." autocomplete="off" />
    </form>
    <div id="help">
      WASD / 矢印キー: 移動　マウスドラッグ: 視点回転
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="libs/three.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
